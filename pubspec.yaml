name: whats_the_move
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.2
  shared_preferences: ^2.5.3
  share_plus: ^11.1.0
  firebase_core: ^4.7.0
  cloud_firestore: ^6.0.3
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - wtm.png

flutter_native_splash:
  color: "#020816"
  image: wtm.png
  android_12:
    color: "#020816"
    image: wtm.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: wtm.png
  min_sdk_android: 21
